#Config V4
services:
  redis:
    platform: linux/amd64
    image: redis:6.2
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  cassandra:
    platform: linux/amd64
    image: cassandra:3.0
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' 127.0.0.1 9042 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
  mysql:
    platform: linux/amd64
    image: mysql:5.7
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ebook_chat
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  rabbitmq-stomp:
    platform: linux/amd64
    image: jorgeacetozi/rabbitmq-stomp:3.6
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613"
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  ebook-chat-app:
    platform: linux/amd64
    image: eclipse-temurin:8-jdk
    container_name: ebook-chat-app
    depends_on:
      mysql:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq-stomp:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ../ebook-chat-1.0.0.jar:/app/ebook-chat-1.0.0.jar:ro
    command: >
      java -jar /app/ebook-chat-1.0.0.jar
      --spring.datasource.url=jdbc:mysql://mysql:3306/ebook_chat?useSSL=false&allowPublicKeyRetrieval=true
      --spring.datasource.username=root
      --spring.datasource.password=root
      --spring.redis.host=redis
      --spring.redis.port=6379
      --spring.rabbitmq.host=rabbitmq-stomp
      --spring.rabbitmq.port=5672
      --spring.rabbitmq.username=guest
      --spring.rabbitmq.password=guest
      --spring.data.cassandra.contact-points=cassandra
      --spring.data.cassandra.port=9042
    ports:
      - "8080:8080"





